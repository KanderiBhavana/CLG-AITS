<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AITS Tirupati | Autonomous - Annamacharya University</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">AITS <span>TIRUPATI</span></div>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#accreditation">Accreditation</a></li>
            <li><a href="#departments">Departments</a></li>
            <li><a href="#" class="btn-cta">Student Portal</a></li>
        </ul>
    </nav>

    <header id="home" class="hero">
        <div class="hero-content">
            <div class="badge">Autonomous Institution</div>
            <h1>Empowering Future Engineers</h1>
            <p>Accredited by NAAC with 'A' Grade & NBA. Affiliated to JNTUA.</p>
            <div class="hero-btns">
                <button class="primary-btn">Admission 2026</button>
                <button class="secondary-btn">Virtual Tour</button>
            </div>
        </div>
    </header>

    <section id="accreditation" class="stats">
        <div class="stat-card">
            <i class="fas fa-award"></i>
            <h3>NAAC 'A'</h3>
            <p>Bangalore Accredited</p>
        </div>
        <div class="stat-card">
            <i class="fas fa-check-circle"></i>
            <h3>NBA</h3>
            <p>5 UG Programs</p>
        </div>
        <div class="stat-card">
            <i class="fas fa-university"></i>
            <h3>UGC</h3>
            <p>2(f) & 12(B) Recognized</p>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
